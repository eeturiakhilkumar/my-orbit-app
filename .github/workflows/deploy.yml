name: Deploy to Firebase and Cloud Run

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Build Frontend
        run: pnpm --filter web build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api-placeholder.com' }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_ORBIT_APP_F2A73 }}
          channelId: ${{ github.event_name == 'pull_request' && 'preview' || 'live' }}
          projectId: my-orbit-app-f2a73

  deploy_backend:
    name: Deploy Backend
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/my-orbit-app-f2a73/cloud-run-source-deploy/my-orbit-api:${{ github.sha }} ./apps/api
          docker tag us-central1-docker.pkg.dev/my-orbit-app-f2a73/cloud-run-source-deploy/my-orbit-api:${{ github.sha }} us-central1-docker.pkg.dev/my-orbit-app-f2a73/cloud-run-source-deploy/my-orbit-api:latest
          docker push us-central1-docker.pkg.dev/my-orbit-app-f2a73/cloud-run-source-deploy/my-orbit-api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/my-orbit-app-f2a73/cloud-run-source-deploy/my-orbit-api:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: my-orbit-api
          image: us-central1-docker.pkg.dev/my-orbit-app-f2a73/cloud-run-source-deploy/my-orbit-api:${{ github.sha }}
          region: us-central1
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            FIREBASE_SERVICE_ACCOUNT_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_ORBIT_APP_F2A73 }}
          flags: |
            --add-cloudsql-instances=my-orbit-app-f2a73:us-central1:my-orbit-app
            --allow-unauthenticated
